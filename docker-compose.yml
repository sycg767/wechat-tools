services:
  postgres:
    image: postgres:16
    container_name: wechat-tools-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wechat_tools}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-wechat_tools}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wechat-tools-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      JAVA_OPTS: ${JAVA_OPTS:-}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-wechat_tools}
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      APP_QR_PUBLIC_BASE_URL: ${APP_QR_PUBLIC_BASE_URL:-}
      STORAGE_LOCAL_BASE_PATH: /app/storage
      LOG_PATH: /app/logs
      PDFCPU_ENABLED: ${PDFCPU_ENABLED:-true}
      PDFCPU_BINARY_PATH: /usr/local/bin/pdfcpu
      PDFCPU_TIMEOUT_SECONDS: ${PDFCPU_TIMEOUT_SECONDS:-60}
      TESSERACT_DATA_PATH: ${TESSERACT_DATA_PATH:-/usr/share/tesseract-ocr/5/tessdata}
      BAIDU_OCR_APP_ID: ${BAIDU_OCR_APP_ID:-}
      BAIDU_OCR_API_KEY: ${BAIDU_OCR_API_KEY:-}
      BAIDU_OCR_SECRET_KEY: ${BAIDU_OCR_SECRET_KEY:-}
      BAIDU_OCR_ENABLED: ${BAIDU_OCR_ENABLED:-false}
      BAIDU_IMAGE_MATTING_API_KEY: ${BAIDU_IMAGE_MATTING_API_KEY:-}
      BAIDU_IMAGE_MATTING_SECRET_KEY: ${BAIDU_IMAGE_MATTING_SECRET_KEY:-}
      BAIDU_IMAGE_MATTING_ENABLED: ${BAIDU_IMAGE_MATTING_ENABLED:-false}
      TENCENT_COS_SECRET_ID: ${TENCENT_COS_SECRET_ID:-}
      TENCENT_COS_SECRET_KEY: ${TENCENT_COS_SECRET_KEY:-}
      TENCENT_COS_REGION: ${TENCENT_COS_REGION:-ap-guangzhou}
      TENCENT_COS_BUCKET: ${TENCENT_COS_BUCKET:-}
      TENCENT_CI_QUEUE_ID: ${TENCENT_CI_QUEUE_ID:-}
      TENCENT_CI_INPUT_PREFIX: ${TENCENT_CI_INPUT_PREFIX:-ci/input/}
      TENCENT_CI_OUTPUT_PREFIX: ${TENCENT_CI_OUTPUT_PREFIX:-ci/output/}
      TENCENT_CI_POLL_INTERVAL_MILLIS: ${TENCENT_CI_POLL_INTERVAL_MILLIS:-2000}
      TENCENT_CI_TIMEOUT_SECONDS: ${TENCENT_CI_TIMEOUT_SECONDS:-180}
      TENCENT_CI_KEEP_REMOTE_FILES: ${TENCENT_CI_KEEP_REMOTE_FILES:-false}
    volumes:
      - backend_storage:/app/storage
      - backend_logs:/app/logs

volumes:
  postgres_data:
  backend_storage:
  backend_logs:
