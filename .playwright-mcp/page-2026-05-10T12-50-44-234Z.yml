          - generic [ref=e153]:
            - separator [ref=e154]:
              - generic [ref=e155]: 为什么有的图片越压缩越大？
            - generic [ref=e157]:
              - paragraph [ref=e158]: 图片压缩后文件变大是一个常见现象，主要原因如下：
              - generic [ref=e159]:
                - heading "1. 压缩质量设置过高" [level=4] [ref=e160]
                - paragraph [ref=e161]: 如果压缩质量设置为1.0（100%），实际上没有进行任何压缩，反而可能因为格式转换导致文件变大。
                - heading "2. 尺寸限制设置不当" [level=4] [ref=e162]
                - paragraph [ref=e163]: 如果设置的最大宽度/高度比原图尺寸还大，图片不会被缩小，反而可能因为重新编码而增大。
                - heading "3. 格式转换问题" [level=4] [ref=e164]
                - paragraph [ref=e165]: 某些格式转换（如PNG转JPG）可能会增加文件大小，特别是当原图包含大量透明区域或简单图形时。
                - heading "4. EXIF信息保留" [level=4] [ref=e166]
                - paragraph [ref=e167]: 保留EXIF信息（相机参数、GPS位置等）会增加文件大小，建议关闭此选项以获得更好的压缩效果。
                - heading "5. 原图已经高度压缩" [level=4] [ref=e168]
                - paragraph [ref=e169]: 如果原图已经是高度压缩的格式（如低质量JPG），再次压缩可能无法获得更好的效果。
              - generic [ref=e170]:
                - heading "💡 压缩建议" [level=4] [ref=e171]
                - list [ref=e172]:
                  - listitem [ref=e173]: • 大文件（>5MB）：质量0.5以下，最大尺寸1200×800
                  - listitem [ref=e174]: • 中等文件（2-5MB）：质量0.6以下，最大尺寸1200×800
                  - listitem [ref=e175]: • 小文件（<2MB）：质量0.7以下，关闭EXIF保留
                  - listitem [ref=e176]: • 开启"智能压缩"选项，让工具自动优化参数
                  - listitem [ref=e177]: • 对于PNG图片，考虑转换为WebP格式以获得更好的压缩效果
              - generic [ref=e178]:
                - heading "⚠️ 注意事项" [level=4] [ref=e179]
                - list [ref=e180]:
                  - listitem [ref=e181]: • 压缩质量越低，文件越小，但图片质量也越差
                  - listitem [ref=e182]: • 尺寸压缩会改变图片分辨率，影响显示效果
                  - listitem [ref=e183]: • 某些特殊格式的图片可能不适合压缩
                  - listitem [ref=e184]: • 建议先压缩少量图片测试效果，再批量处理
