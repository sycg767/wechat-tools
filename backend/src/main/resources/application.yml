server:
  port: 8080
  servlet:
    context-path: /api

# 默认 dev profile；线上部署需通过 SPRING_PROFILES_ACTIVE=prod 切换
spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  application:
    name: wechat-tools-backend
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:wechat_tools}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:root}
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      pool-name: HikariCP-WeChatTools
      max-lifetime: 1800000
      connection-timeout: 30000
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
      separator: ;;
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 20
  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 100MB
  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss
  task:
    scheduling:
      pool:
        size: 2

app:
  qr:
    public-base-url: ${APP_QR_PUBLIC_BASE_URL:}

storage:
  local:
    base-path: ${STORAGE_LOCAL_BASE_PATH:storage}

file:
  cleanup:
    enabled: true
    max-age-hours: 720

baidu:
  # 百度文字识别服务 (用于战绩截图识别、PDF提取文字等)
  ocr:
    app-id: ${BAIDU_OCR_APP_ID:}
    api-key: ${BAIDU_OCR_API_KEY:}
    secret-key: ${BAIDU_OCR_SECRET_KEY:}
    enabled: ${BAIDU_OCR_ENABLED:false}
  # 百度智能抠图服务 (用于证件照换底色功能)
  image-matting:
    api-key: ${BAIDU_IMAGE_MATTING_API_KEY:}
    secret-key: ${BAIDU_IMAGE_MATTING_SECRET_KEY:}
    enabled: ${BAIDU_IMAGE_MATTING_ENABLED:false}

pdfcpu:
  enabled: ${PDFCPU_ENABLED:true}
  binary-path: ${PDFCPU_BINARY_PATH:}
  timeout-seconds: ${PDFCPU_TIMEOUT_SECONDS:60}

tencent:
  # 腾讯云对象存储 (用于文件上传、下载和临时存放)
  cos:
    secret-id: ${TENCENT_COS_SECRET_ID:}
    secret-key: ${TENCENT_COS_SECRET_KEY:}
    region: ${TENCENT_COS_REGION:ap-guangzhou}
    bucket: ${TENCENT_COS_BUCKET:}
  # 腾讯云数据万象 (用于文档处理，如 Word 转 PDF)
  ci:
    queue-id: ${TENCENT_CI_QUEUE_ID:}
    input-prefix: ${TENCENT_CI_INPUT_PREFIX:ci/input/}
    output-prefix: ${TENCENT_CI_OUTPUT_PREFIX:ci/output/}
    poll-interval-millis: ${TENCENT_CI_POLL_INTERVAL_MILLIS:2000}
    timeout-seconds: ${TENCENT_CI_TIMEOUT_SECONDS:180}
    keep-remote-files: ${TENCENT_CI_KEEP_REMOTE_FILES:false}

free-astro:
  enabled: ${FREE_ASTRO_ENABLED:false}
  api-key: ${FREE_ASTRO_API_KEY:}
  base-url: ${FREE_ASTRO_BASE_URL:https://api.freeastroapi.com}
  timeout-millis: ${FREE_ASTRO_TIMEOUT_MILLIS:5000}

vault:
  crypto-key: ${VAULT_CRYPTO_KEY:change-this-in-env}
  demo-user-id: ${VAULT_DEMO_USER_ID:}
  demo-openid: ${VAULT_DEMO_OPENID:vault-demo-user}

# 监控端点：仅暴露 health/info/prometheus，避免内部接口被外部探测
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}
